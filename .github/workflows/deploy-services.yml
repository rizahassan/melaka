name: Deploy Services

on:
  push:
    branches: [main]
    paths:
      - 'services/listener/**'
      - 'services/worker/**'
      - '.github/workflows/deploy-services.yml'
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - listener
          - worker

env:
  PROJECT_ID: melaka-cloud
  REGION: us-central1

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      listener: ${{ steps.changes.outputs.listener }}
      worker: ${{ steps.changes.outputs.worker }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Check for changes
        id: changes
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ inputs.service }}" == "all" || "${{ inputs.service }}" == "listener" ]]; then
              echo "listener=true" >> $GITHUB_OUTPUT
            else
              echo "listener=false" >> $GITHUB_OUTPUT
            fi
            if [[ "${{ inputs.service }}" == "all" || "${{ inputs.service }}" == "worker" ]]; then
              echo "worker=true" >> $GITHUB_OUTPUT
            else
              echo "worker=false" >> $GITHUB_OUTPUT
            fi
          else
            # Check git diff for push events
            git fetch origin ${{ github.event.before }} --depth=1 2>/dev/null || true
            
            if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -q '^services/listener/'; then
              echo "listener=true" >> $GITHUB_OUTPUT
            else
              echo "listener=false" >> $GITHUB_OUTPUT
            fi
            
            if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -q '^services/worker/'; then
              echo "worker=true" >> $GITHUB_OUTPUT
            else
              echo "worker=false" >> $GITHUB_OUTPUT
            fi
          fi

  deploy-listener:
    needs: detect-changes
    if: needs.detect-changes.outputs.listener == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Deploy Listener
        run: |
          gcloud builds submit \
            --config=services/listener/cloudbuild.yaml \
            --substitutions=_REGION=${{ env.REGION }}

      - name: Get Service URL
        run: |
          URL=$(gcloud run services describe melaka-listener \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "✅ Listener deployed: $URL"

  deploy-worker:
    needs: detect-changes
    if: needs.detect-changes.outputs.worker == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Deploy Worker
        run: |
          gcloud builds submit \
            --config=services/worker/cloudbuild.yaml \
            --substitutions=_REGION=${{ env.REGION }}

      - name: Get Service URL
        run: |
          URL=$(gcloud run services describe melaka-worker \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "✅ Worker deployed: $URL"
