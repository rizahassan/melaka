name: Deploy Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'packages/dashboard/**'
      - 'packages/core/**'
      - 'packages/cloud/**'
      - '.github/workflows/deploy-dashboard.yml'
  workflow_dispatch:

env:
  PROJECT_ID: melaka-cloud
  REGION: us-central1

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Deploy Dashboard to Cloud Run
        run: |
          BUILD_OUTPUT=$(gcloud builds submit \
            --config=packages/dashboard/cloudbuild.yaml \
            --async \
            --format='value(id)')
          
          BUILD_ID=$(echo "$BUILD_OUTPUT" | tail -1)
          echo "Build ID: $BUILD_ID"
          
          echo "Waiting for build to complete..."
          while true; do
            sleep 30
            STATUS=$(gcloud builds describe "$BUILD_ID" --format='value(status)' 2>/dev/null || echo "PENDING")
            echo "Status: $STATUS"
            
            if [[ "$STATUS" == "SUCCESS" ]]; then
              echo "✅ Build succeeded"
              break
            elif [[ "$STATUS" == "FAILURE" || "$STATUS" == "CANCELLED" || "$STATUS" == "TIMEOUT" ]]; then
              echo "❌ Build failed with status: $STATUS"
              exit 1
            fi
          done

      - name: Get Service URL
        run: |
          URL=$(gcloud run services describe melaka-dashboard \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "✅ Dashboard deployed: $URL"
          echo "DASHBOARD_URL=$URL" >> $GITHUB_OUTPUT
