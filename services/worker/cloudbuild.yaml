steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/melaka-worker:${_TAG}'
      - '-t'
      - 'gcr.io/$PROJECT_ID/melaka-worker:latest'
      - '-f'
      - 'services/worker/Dockerfile'
      - '.'
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/melaka-worker:${_TAG}'
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/melaka-worker:latest'
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args:
      - 'gcloud'
      - 'run'
      - 'deploy'
      - 'melaka-worker'
      - '--image'
      - 'gcr.io/$PROJECT_ID/melaka-worker:${_TAG}'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
substitutions:
  _TAG: latest
images:
  - 'gcr.io/$PROJECT_ID/melaka-worker:${_TAG}'
  - 'gcr.io/$PROJECT_ID/melaka-worker:latest'
